name: CMS — build & push image (GHCR)

# Construit l'image Strapi de PRODUCTION EN CI (jamais sur le droplet : 2 Go → OOM) et la
# pousse sur GHCR. Le droplet ne fait ensuite que `docker compose pull && up -d`.
# Contexte de build = apps/cms (app autonome, yarn/Node 22, hors pnpm-workspace).
# Cf. docs/infra/RUNBOOK-cms-digitalocean.md
on:
  push:
    branches: [main]
    paths:
      - 'apps/cms/**'
      - '.github/workflows/deploy-cms.yml'
  workflow_dispatch:

concurrency:
  group: cms-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build (linux/amd64) → GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/cms
          file: apps/cms/Dockerfile.production
          platforms: linux/amd64 # le droplet est amd64
          push: true
          tags: |
            ghcr.io/reseau-evolve-capital/rec-cms:latest
            ghcr.io/reseau-evolve-capital/rec-cms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
