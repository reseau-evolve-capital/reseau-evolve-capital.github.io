name: Deploy Vitrine (GitHub Pages)

# Le blog vitrine est généré en SSG en consommant l'API Strapi DISTANTE
# (strapi.reseauevolvecapital.com, hébergée sur DigitalOcean — cf. deploy-cms.yml).
#
# ⚠ Garde anti-blog-vide : si Strapi est injoignable, les try/catch de src/lib/api.ts
# renverraient [] → blog VIDE publié par-dessus le live. L'étape « Vérifier Strapi »
# ci-dessous ÉCHOUE le job avant tout build si l'API ne renvoie aucun article → le
# site en ligne est préservé. Voir apps/vitrine/CLAUDE.md.
#
# Déclencheurs :
#   - push main (changements code vitrine) ;
#   - repository_dispatch « strapi-content-update » : à câbler depuis un webhook
#     Strapi pour rebuild le blog quand le CONTENU change (sans commit) ;
#   - workflow_dispatch (manuel).
on:
  push:
    branches: [main]
    paths:
      - 'apps/vitrine/**'
      - '.github/workflows/deploy-vitrine.yml'
  repository_dispatch:
    types: [strapi-content-update]
  workflow_dispatch:

# Plusieurs publications Strapi rapprochées → plusieurs dispatches. On coalesce : un seul
# déploiement Pages à la fois, sans annuler celui en cours (cancel-in-progress: false).
concurrency:
  group: deploy-vitrine-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GARDE anti-blog-vide : on échoue le job AVANT le build si Strapi est injoignable
      # ou ne renvoie aucun article — pour ne JAMAIS publier un blog vide par-dessus le live.
      # Override possible de l'URL via la variable de dépôt NEXT_PUBLIC_STRAPI_API_URL.
      - name: Vérifier que Strapi répond (garde anti-blog-vide)
        env:
          STRAPI_API_URL: ${{ vars.NEXT_PUBLIC_STRAPI_API_URL || 'https://strapi.reseauevolvecapital.com/api' }}
        run: |
          set -euo pipefail
          echo "Vérification de ${STRAPI_API_URL}/articles…"
          # -g/--globoff : sans ça, curl interprète les crochets [ ] de l'URL comme un glob → erreur.
          count=$(curl -fsS -g --max-time 30 "${STRAPI_API_URL}/articles?pagination[pageSize]=1" | jq '.data | length')
          if [ "${count:-0}" -lt 1 ]; then
            echo "::error::Strapi ne renvoie aucun article (ou est injoignable) — déploiement annulé pour ne pas publier un blog vide."
            exit 1
          fi
          echo "OK — Strapi accessible, ${count} article(s) visible(s)."

      - name: Build vitrine
        working-directory: apps/vitrine
        env:
          # API Strapi distante consommée au build (SSG). Override via variables de dépôt.
          NEXT_PUBLIC_STRAPI_API_URL: ${{ vars.NEXT_PUBLIC_STRAPI_API_URL || 'https://strapi.reseauevolvecapital.com/api' }}
          NEXT_PUBLIC_STRAPI_URL: ${{ vars.NEXT_PUBLIC_STRAPI_URL || 'https://strapi.reseauevolvecapital.com' }}
          NEXT_PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN }}
          # GA4 (UBA) — flux vitrine. Measurement ID PUBLIC. Override via variable de dépôt.
          NEXT_PUBLIC_GA_ID_VITRINE: ${{ vars.NEXT_PUBLIC_GA_ID_VITRINE || 'G-LP0PW78BQ5' }}
          NEXT_PUBLIC_CONSENT_BANNER_VARIANT: ${{ vars.NEXT_PUBLIC_CONSENT_BANNER_VARIANT || 'compact' }}
          NEXT_PUBLIC_CONSENT_BANNER_SIDE: ${{ vars.NEXT_PUBLIC_CONSENT_BANNER_SIDE || 'gauche' }}
          NEXT_PUBLIC_APP_SCRIPT_URL: ${{ secrets.NEXT_PUBLIC_APP_SCRIPT_URL }}
          NEXT_PUBLIC_CONTACT_FORM_URL: ${{ secrets.NEXT_PUBLIC_CONTACT_FORM_URL }}
        run: pnpm build

      - name: Ensure CNAME in out/
        working-directory: apps/vitrine
        run: |
          if [ ! -f out/CNAME ]; then
            echo "reseauevolvecapital.com" > out/CNAME
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'apps/vitrine/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
