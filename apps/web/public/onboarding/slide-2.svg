<svg viewBox="0 0 240 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="160" fill="#FAF9F7"/>
  <!-- Rectangle principal club -->
  <rect x="60" y="40" width="120" height="80" rx="8" fill="#FDC70C" fill-opacity="0.18" stroke="#FDC70C" stroke-width="1.5"/>
  <!-- Barre supérieure -->
  <rect x="60" y="40" width="120" height="20" rx="8" fill="#FDC70C" fill-opacity="0.5"/>
  <rect x="60" y="52" width="120" height="8" fill="#FDC70C" fill-opacity="0.5"/>
  <!-- Points intérieurs — membres -->
  <circle cx="90" cy="90" r="8" fill="#FDC70C"/>
  <circle cx="120" cy="90" r="8" fill="#231F20" fill-opacity="0.15" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="150" cy="90" r="8" fill="#231F20" fill-opacity="0.15" stroke="#231F20" stroke-width="1.5"/>
  <!-- Ligne de connexion -->
  <line x1="98" y1="90" x2="112" y2="90" stroke="#231F20" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="128" y1="90" x2="142" y2="90" stroke="#231F20" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Lignes de stat bas -->
  <rect x="76" y="110" width="28" height="4" rx="2" fill="#231F20" fill-opacity="0.15"/>
  <rect x="76" y="110" width="18" height="4" rx="2" fill="#FDC70C"/>
  <rect x="112" y="110" width="28" height="4" rx="2" fill="#231F20" fill-opacity="0.15"/>
  <rect x="112" y="110" width="22" height="4" rx="2" fill="#231F20" fill-opacity="0.4"/>
  <rect x="148" y="110" width="28" height="4" rx="2" fill="#231F20" fill-opacity="0.15"/>
  <rect x="148" y="110" width="12" height="4" rx="2" fill="#FDC70C" fill-opacity="0.7"/>
</svg>
